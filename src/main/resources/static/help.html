<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostify 帮助文档</title>
    <link rel="icon" href="/favicon.png">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
            background-color: #fff;
        }
        .sidebar-sticky {
            height: calc(100vh - 48px);
            overflow-x: hidden;
            overflow-y: auto;
        }
        .sidebar .nav-link {
            font-weight: 500;
            color: #333;
            padding: 8px 20px;
        }
        .sidebar .nav-link:hover {
            color: #007bff;
        }
        .sidebar .nav-link.active {
            color: #007bff;
            background-color: rgba(0, 123, 255, .1);
        }
        .main-content {
            margin-left: 220px;
            padding: 20px;
        }
        .markdown-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.24);
            line-height: 1.6;
        }
        .markdown-content h1 {
            color: #333;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .markdown-content h2 {
            color: #333;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        .markdown-content h3 {
            color: #333;
            margin-top: 20px;
            margin-bottom: 12px;
        }
        .markdown-content p {
            margin-bottom: 16px;
        }
        .markdown-content code {
            background-color: #f6f8fa;
            border-radius: 3px;
            padding: 0.2em 0.4em;
            font-size: 85%;
        }
        .markdown-content pre {
            background-color: #f6f8fa;
            border-radius: 3px;
            padding: 16px;
            overflow: auto;
            margin-bottom: 16px;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
            font-size: 100%;
        }
        .markdown-content ul, .markdown-content ol {
            padding-left: 30px;
            margin-bottom: 16px;
        }
        .markdown-content li {
            margin-bottom: 8px;
        }
        .markdown-content blockquote {
            margin: 0 0 16px;
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
        }
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .navbar-brand {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6" href="index.html">Hostify</a>
        <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3 sidebar-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="#arch-doc" id="arch-link">
                                <i class="bi bi-diagram-3"></i>
                                项目架构文档
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#batch-import-doc" id="batch-link">
                                <i class="bi bi-file-earmark-arrow-up"></i>
                                批量导入指南
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 主要内容 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">帮助文档</h1>
                </div>

                <!-- 项目架构文档 -->
                <div id="arch-doc" class="markdown-content">
                    <h1>Hostify 项目架构文档</h1>
                    <p>这是 Hostify 项目的详细架构说明文档。</p>
                    <p><a href="arch.md" target="_blank" class="btn btn-primary"><i class="bi bi-download"></i> 下载原始 Markdown 文件</a></p>
                    <hr>
                    <!-- 这里将通过 JavaScript 动态加载内容 -->
                    <div id="arch-content"></div>
                </div>

                <!-- 批量导入指南 -->
                <div id="batch-import-doc" class="markdown-content mt-4">
                    <h1>Hostify 批量导入指南</h1>
                    <p>这是 Hostify 批量导入功能的详细使用指南。</p>
                    <p><a href="BATCH_IMPORT_GUIDE.md" target="_blank" class="btn btn-primary"><i class="bi bi-download"></i> 下载原始 Markdown 文件</a></p>
                    <hr>
                    <!-- 这里将通过 JavaScript 动态加载内容 -->
                    <div id="batch-content"></div>
                </div>

                <!-- 回到顶部按钮 -->
                <button class="btn btn-secondary back-to-top" onclick="scrollToTop()">
                    <i class="bi bi-arrow-up"></i> 回到顶部
                </button>
            </main>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/marked.min.js"></script>
    <script>
        // 配置 marked.js
        marked.setOptions({
            breaks: true, // 支持硬换行
            gfm: true,    // 启用 GitHub Flavored Markdown
            smartLists: true,
            smartypants: true
        });

        // 加载 Markdown 文件并转换为 HTML
        async function loadMarkdownFile(url, targetId) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const markdown = await response.text();
                const html = marked.parse(markdown);
                document.getElementById(targetId).innerHTML = html;
            } catch (error) {
                console.error('Error loading markdown file:', error);
                document.getElementById(targetId).innerHTML = '<p class="text-danger">加载文档时出错，请稍后重试。</p>';
            }
        }

        // 页面加载完成后加载 Markdown 内容
        document.addEventListener('DOMContentLoaded', function() {
            loadMarkdownFile('arch.md', 'arch-content');
            loadMarkdownFile('BATCH_IMPORT_GUIDE.md', 'batch-content');
            
            // 侧边栏导航点击事件
            document.getElementById('arch-link').addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('arch-doc').scrollIntoView({ behavior: 'smooth' });
            });
            
            document.getElementById('batch-link').addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('batch-import-doc').scrollIntoView({ behavior: 'smooth' });
            });
        });

        // 回到顶部功能
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 滚动时更新侧边栏激活状态
        window.addEventListener('scroll', function() {
            const archPos = document.getElementById('arch-doc').offsetTop;
            const batchPos = document.getElementById('batch-import-doc').offsetTop;
            const currentPos = window.scrollY + 100;
            
            if (currentPos >= batchPos) {
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
                document.getElementById('batch-link').classList.add('active');
            } else if (currentPos >= archPos) {
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
                document.getElementById('arch-link').classList.add('active');
            }
        });
    </script>
</body>
</html>
