<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostify - 登录</title>
    <link rel="icon" href="/favicon.png">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }

        .brand-icon i {
            font-size: 30px;
            color: white;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
            margin: 0 0 4px 0;
            letter-spacing: -0.3px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 15px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-control {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            color: #f1f5f9 !important;
            font-size: 14px;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-control::placeholder {
            color: #64748b;
        }

        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:focus {
            -webkit-text-fill-color: #f1f5f9;
            -webkit-box-shadow: 0 0 0 1000px #1e3a5f inset;
            transition: background-color 5000s;
        }

        .form-control:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.08);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-control:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: #3b82f6;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35);
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            opacity: 0.9;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.45);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 11px 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fca5a5;
            font-size: 13px;
        }

        .alert-error i {
            font-size: 15px;
            flex-shrink: 0;
        }

        .footer-hint {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }

        .footer-hint span {
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">
                    <i class="bi bi-hdd-network"></i>
                </div>
                <h1 class="brand-title">Hostify</h1>
                <p class="brand-subtitle">Hosts 配置管理面板</p>
            </div>

            <div class="alert-error" th:if="${param.error}">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span>用户名或密码错误，请重试</span>
            </div>

            <form method="post" action="/login">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <div class="input-wrapper">
                        <input class="form-control" type="text" id="username" name="username"
                               placeholder="请输入用户名" autocomplete="username" required>
                        <i class="bi bi-person input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <div class="input-wrapper">
                        <input class="form-control" type="password" id="password" name="password"
                               placeholder="请输入密码" autocomplete="current-password" required>
                        <i class="bi bi-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    登录
                </button>
            </form>

            <div class="footer-hint">
                <span>Hostify &copy; 2025</span>
            </div>
        </div>
    </div>
</body>
</html>
