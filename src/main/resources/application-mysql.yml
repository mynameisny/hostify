spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/hostify?sslMode=DISABLED&verifyServerCertificate=false}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
